<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  :root { --bg: #1a1d2e; --bg2: #252840; --bg3: #2f3350; --accent: #6c63ff; --accent2: #a78bfa; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b; --success: #22c55e; --danger: #ef4444; --warn: #f59e0b; --r: 8px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 340px; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; }
  .header { background: var(--bg2); padding: .875rem 1rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2d4a; }
  .logo { font-weight: 700; color: var(--accent2); font-size: 15px; display: flex; align-items: center; gap: .4rem; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); }
  .status-dot.ok { background: var(--success); }
  .status-dot.err { background: var(--danger); }
  .content { padding: .875rem; }
  .section { margin-bottom: 1rem; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }
  .entry-item { background: var(--bg2); border: 1px solid #2a2d4a; border-radius: var(--r); padding: .65rem .875rem; margin-bottom: .4rem; cursor: pointer; display: flex; align-items: center; gap: .65rem; transition: all .15s; }
  .entry-item:hover { border-color: var(--accent); }
  .entry-icon { width: 28px; height: 28px; background: var(--bg3); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-name { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-user { color: var(--text2); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-actions { display: flex; gap: .25rem; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: .2rem; border-radius: 4px; transition: .15s; }
  .icon-btn:hover { background: var(--bg3); color: var(--text); }
  .empty { color: var(--text3); text-align: center; padding: 1.5rem .5rem; font-size: 12px; }
  .btn { width: 100%; padding: .55rem; border-radius: var(--r); border: none; cursor: pointer; font-size: 13px; font-weight: 500; margin-bottom: .4rem; display: flex; align-items: center; justify-content: center; gap: .4rem; transition: .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #5a52e8; }
  .btn-outline { background: transparent; border: 1px solid #3a3d5a; color: var(--text2); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .lock-box { padding: 1.5rem 1rem; text-align: center; }
  .lock-icon { font-size: 2rem; margin-bottom: .75rem; }
  .lock-title { font-weight: 600; margin-bottom: .3rem; }
  .lock-sub { color: var(--text2); font-size: 12px; margin-bottom: 1rem; }
  input { width: 100%; background: var(--bg3); border: 1px solid #3a3d5a; border-radius: 6px; padding: .5rem .75rem; color: var(--text); font-size: 13px; outline: none; margin-bottom: .5rem; }
  input:focus { border-color: var(--accent); }
  .alert { padding: .4rem .6rem; border-radius: 6px; font-size: 12px; margin-bottom: .5rem; }
  .alert-error { background: rgba(239,68,68,.12); color: #fca5a5; }
  .alert-success { background: rgba(34,197,94,.12); color: #86efac; }
  .gen-box { background: var(--bg2); border: 1px solid #2a2d4a; border-radius: var(--r); padding: .65rem; }
  .pwd-output { font-family: monospace; font-size: 12px; color: var(--accent2); word-break: break-all; margin-bottom: .5rem; min-height: 36px; }
  .gen-actions { display: flex; gap: .4rem; }
  .gen-btn { flex: 1; padding: .4rem; border-radius: 6px; border: 1px solid #3a3d5a; background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; }
  .gen-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tabs { display: flex; background: var(--bg2); border-bottom: 1px solid #2a2d4a; }
  .tab { flex: 1; padding: .55rem; text-align: center; cursor: pointer; font-size: 12px; color: var(--text3); border-bottom: 2px solid transparent; transition: .15s; }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  #current-url { font-size: 11px; color: var(--text3); padding: 0 .875rem .3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">🔒 PyVault</div>
  <div style="display:flex; align-items:center; gap:.4rem;">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text" style="font-size:11px; color: var(--text3);">Chargement...</span>
  </div>
</div>

<div id="main-content">
  <!-- Locked state -->
  <div id="locked-view" class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">Vault verrouillé</div>
    <div class="lock-sub">Entrez votre mot de passe maître</div>
    <div id="lock-alert"></div>
    <input type="password" id="master-input" placeholder="Mot de passe maître" autocomplete="current-password">
    <button class="btn btn-primary" onclick="unlock()">Déverrouiller</button>
    <button class="btn btn-outline" onclick="openVaultUI()">Ouvrir l'interface</button>
  </div>

  <!-- Unlocked state -->
  <div id="unlocked-view" style="display:none;">
    <div id="current-url"></div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('autofill')">Connexion auto</div>
      <div class="tab" onclick="switchTab('all')">Tous</div>
      <div class="tab" onclick="switchTab('generate')">Générer</div>
    </div>

    <!-- Tab: Auto-fill -->
    <div id="tab-autofill" class="tab-content active">
      <div class="content">
        <div class="section">
          <div class="section-title" id="autofill-title">Comptes pour ce site</div>
          <div id="autofill-list">
            <div class="empty">Chargement...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab: All entries -->
    <div id="tab-all" class="tab-content">
      <div class="content">
        <div class="section">
          <input type="text" id="search-input" placeholder="Rechercher..." oninput="searchAll(this.value)">
          <div id="all-list"></div>
        </div>
      </div>
    </div>

    <!-- Tab: Generate -->
    <div id="tab-generate" class="tab-content">
      <div class="content">
        <div class="gen-box">
          <div class="pwd-output" id="gen-output">—</div>
          <div class="gen-actions">
            <button class="gen-btn" onclick="genPwd()">⚡ Générer</button>
            <button class="gen-btn" onclick="copyGen()">📋 Copier</button>
            <button class="gen-btn" onclick="fillGen()">⌨ Injecter</button>
          </div>
        </div>
        <div id="entropy-display" style="font-size:11px; color: var(--text3); margin: .4rem 0;"></div>
        <div style="margin-top: .5rem;">
          <label style="font-size:11px; color: var(--text3);">Longueur : <span id="len-disp">20</span></label>
          <input type="range" min="8" max="64" value="20" oninput="document.getElementById('len-disp').textContent=this.value;genPwd();" id="gen-len" style="margin:.3rem 0;">
        </div>
      </div>
    </div>

    <div style="padding: .5rem .875rem; border-top: 1px solid #2a2d4a;">
      <button class="btn btn-outline" onclick="lock()" style="margin: 0; width: 100%;">🔒 Verrouiller</button>
    </div>
  </div>
</div>

<script>
const API    = "http://127.0.0.1:7890";
let TOKEN    = "";
let tabUrl   = "";
let allEnts  = [];

// ── Init ─────────────────────────────────────────────────────────────────────
chrome.storage.local.get(["pyvault_token"], async data => {
  TOKEN = data.pyvault_token || "";
  const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
  tabUrl = tab?.url || "";
  document.getElementById("current-url").textContent = "🌐 " + (tab?.title || tabUrl).substring(0, 60);
  await checkStatus();
});

async function checkStatus() {
  try {
    const r = await apiFetch("/api/vault/status");
    if (!r.exists) {
      setStatus("Vault non créé", false);
      document.getElementById("lock-alert").innerHTML =
        '<div class="alert alert-success">Ouvrez l\'interface pour créer votre vault.</div>';
      return;
    }
    if (r.unlocked) {
      showUnlocked();
    } else {
      setStatus("Verrouillé", false);
    }
  } catch {
    setStatus("Serveur déconnecté", false);
    document.getElementById("locked-view").innerHTML =
      `<div class="lock-box"><div class="lock-icon">⚠️</div>
       <div class="lock-title">PyVault non démarré</div>
       <div class="lock-sub">Lancez <code>python main.py</code> dans un terminal.</div>
       <button class="btn btn-primary" onclick="window.close()">Fermer</button></div>`;
  }
}

function setStatus(text, ok) {
  document.getElementById("status-text").textContent = text;
  document.getElementById("status-dot").className = "status-dot " + (ok ? "ok" : "err");
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function unlock() {
  const pwd = document.getElementById("master-input").value;
  const r = await apiFetch("/api/vault/unlock", "POST", { master_password: pwd });
  if (r.success) {
    showUnlocked();
  } else {
    document.getElementById("lock-alert").innerHTML =
      `<div class="alert alert-error">${r.error}</div>`;
  }
}

async function lock() {
  await apiFetch("/api/vault/lock", "POST");
  document.getElementById("unlocked-view").style.display = "none";
  document.getElementById("locked-view").style.display = "block";
  setStatus("Verrouillé", false);
}

function showUnlocked() {
  document.getElementById("locked-view").style.display = "none";
  document.getElementById("unlocked-view").style.display = "block";
  setStatus("Déverrouillé", true);
  loadAutofill();
  loadAll();
  genPwd();
}

function openVaultUI() {
  chrome.tabs.create({ url: `${API}?token=${TOKEN}` });
}

// ── Auto-fill ─────────────────────────────────────────────────────────────────
async function loadAutofill() {
  const entries = await apiFetch(`/api/entries/by-url?url=${encodeURIComponent(tabUrl)}`);
  const list = document.getElementById("autofill-list");
  if (!entries.length) {
    list.innerHTML = '<div class="empty">Aucun compte enregistré pour ce site.</div>';
    document.getElementById("autofill-title").textContent = "Aucun compte trouvé";
    return;
  }
  document.getElementById("autofill-title").textContent = `${entries.length} compte(s) trouvé(s)`;
  list.innerHTML = entries.map(e => renderEntry(e, true)).join("");
}

async function loadAll() {
  allEnts = await apiFetch("/api/entries");
  renderAll(allEnts);
}

async function searchAll(q) {
  const res = q ? await apiFetch(`/api/entries?q=${encodeURIComponent(q)}`) : allEnts;
  renderAll(res);
}

function renderAll(entries) {
  document.getElementById("all-list").innerHTML =
    entries.length ? entries.slice(0, 20).map(e => renderEntry(e, false)).join("")
    : '<div class="empty">Aucun résultat</div>';
}

function renderEntry(e, fill) {
  return `<div class="entry-item">
    <div class="entry-icon">${e.site_name[0].toUpperCase()}</div>
    <div class="entry-info">
      <div class="entry-name">${e.site_name}</div>
      <div class="entry-user">${e.username}</div>
    </div>
    <div class="entry-actions">
      ${fill ? `<button class="icon-btn" onclick="fillCredentials(${e.id})" title="Remplir le formulaire">⌨</button>` : ""}
      <button class="icon-btn" onclick="copyEntryPwd(${e.id})" title="Copier le mot de passe">📋</button>
      <button class="icon-btn" onclick="copyUsername('${e.username.replace(/'/g, "\\'")}')" title="Copier l'identifiant">👤</button>
    </div>
  </div>`;
}

async function fillCredentials(id) {
  const entry = await apiFetch(`/api/entries/${id}`);
  const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
  await chrome.scripting.executeScript({
    target: { tabId: tab.id },
    func: (username, password) => {
      const userFields = document.querySelectorAll('input[type="email"], input[type="text"][name*="user"], input[type="text"][name*="email"], input[name*="login"]');
      const pwdFields  = document.querySelectorAll('input[type="password"]');
      if (userFields.length) {
        userFields[0].value = username;
        userFields[0].dispatchEvent(new Event("input", { bubbles: true }));
      }
      if (pwdFields.length) {
        pwdFields[0].value = password;
        pwdFields[0].dispatchEvent(new Event("input", { bubbles: true }));
      }
    },
    args: [entry.username, entry.password],
  });
}

async function copyEntryPwd(id) {
  const entry = await apiFetch(`/api/entries/${id}`);
  await navigator.clipboard.writeText(entry.password);
}

function copyUsername(username) {
  navigator.clipboard.writeText(username);
}

// ── Generator ─────────────────────────────────────────────────────────────────
async function genPwd() {
  const len = parseInt(document.getElementById("gen-len").value);
  const r = await apiFetch("/api/generate", "POST", { length: len });
  document.getElementById("gen-output").textContent = r.password;
  const e = r.entropy;
  document.getElementById("entropy-display").innerHTML =
    `<span style="color:${e.color}">${e.strength} — ${e.entropy_bits} bits</span>`;
}

function copyGen() {
  navigator.clipboard.writeText(document.getElementById("gen-output").textContent);
}

async function fillGen() {
  const pwd = document.getElementById("gen-output").textContent;
  const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
  await chrome.scripting.executeScript({
    target: { tabId: tab.id },
    func: (p) => {
      const f = document.querySelector('input[type="password"]');
      if (f) { f.value = p; f.dispatchEvent(new Event("input", { bubbles: true })); }
    },
    args: [pwd],
  });
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add("active");
  document.getElementById(`tab-${name}`).classList.add("active");
}

// ── API helper ────────────────────────────────────────────────────────────────
async function apiFetch(path, method = "GET", body = null) {
  const opts = { method, headers: { "X-PyVault-Token": TOKEN, "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${API}${path}`, opts);
  return r.json();
}

document.getElementById("master-input").addEventListener("keydown", e => {
  if (e.key === "Enter") unlock();
});
</script>
</body>
</html>
